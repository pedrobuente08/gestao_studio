worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # Login e registro: 5 requisições por minuto por IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # API geral: 60 requisições por minuto por IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

    # ── Upstream services ──────────────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:3001;
    }

    # ── Servidor principal ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Redireciona HTTP → HTTPS em produção (descomentar quando tiver SSL)
        # return 301 https://$host$request_uri;

        # ── Headers de segurança HTTP ─────────────────────────────────────────
        # Impede que o site seja carregado dentro de iframes (clickjacking)
        add_header X-Frame-Options "DENY" always;
        # Impede que o browser adivinhe o content-type (MIME sniffing)
        add_header X-Content-Type-Options "nosniff" always;
        # Força HTTPS por 1 ano em produção (descomentar quando SSL estiver ativo)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # Limita informações enviadas no cabeçalho Referer
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Restringe acesso a funcionalidades do browser desnecessárias
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # Content Security Policy: só aceita recursos da própria origem
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.resend.com https://*.supabase.co;" always;
        # Remove a versão do Nginx do cabeçalho Server
        server_tokens off;

        # ── Endpoints de autenticação (rate limit agressivo) ──────────────────
        location ~ ^/api/auth/(sign-in|sign-up) {
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── API geral (rate limit moderado) ──────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Frontend (Next.js) ────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
