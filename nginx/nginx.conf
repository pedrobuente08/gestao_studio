worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # Login e registro: 5 requisições por minuto por IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # API geral: 60 requisições por minuto por IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

    # ── Upstream services ──────────────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:3001;
    }

    # ── Servidor principal ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Redireciona HTTP → HTTPS em produção (descomentar quando tiver SSL)
        # return 301 https://$host$request_uri;

        # ── Endpoints de autenticação (rate limit agressivo) ──────────────────
        location ~ ^/api/auth/(sign-in|sign-up) {
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── API geral (rate limit moderado) ──────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Frontend (Next.js) ────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
